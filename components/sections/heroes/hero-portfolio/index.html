<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Personal — Design System</title>
  <link rel="stylesheet" href="../../../../tokens/tokens.css">
  <link rel="stylesheet" href="../../../../base/reset.css">
  <link rel="stylesheet" href="../../../../base/base.css">
  <link rel="stylesheet" href="../../../../base/utilities.css">
  <link rel="stylesheet" href="../../../atoms/buttons/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DS Navigator Bar — utilitário de navegação, não é parte do componente -->
<div id="ds-nav-bar">
  <a href="../../../../index.html" id="ds-nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Todos os componentes
  </a>
  <span id="ds-nav-label">Hero Personal</span>
</div>
<style>
  #ds-nav-bar { position: sticky; top: 0; z-index: 9999; background: #0F0E1A; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 40px; gap: 16px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
  #ds-nav-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.65); text-decoration: none; font-weight: 500; transition: color .15s; white-space: nowrap; }
  #ds-nav-back:hover { color: #fff; }
  #ds-nav-back svg { flex-shrink: 0; }
  #ds-nav-label { font-size: 11px; color: rgba(255,255,255,.3); letter-spacing: .04em; white-space: nowrap; }
</style>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Seta arrow direita -->
  <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14M12 5l7 7-7 7"/>
  </symbol>
  <!-- Seta diagonal ↗ -->
  <symbol id="icon-arrow-upright" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 17L17 7M7 7h10v10"/>
  </symbol>
  <!-- Moon (dark mode) -->
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  </symbol>
  <!-- Chevron down -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 9l6 6 6-6"/>
  </symbol>
</svg>


<section class="hero-personal" aria-labelledby="hp-title">

  <!-- Nome (atrás da foto, topo) -->
  <p class="hero-personal__name" aria-hidden="true">Rafael Mendes,</p>

  <!-- Título gigante (atrás da foto, centro) -->
  <h1 class="hero-personal__title" id="hp-title">Consultor</h1>

  <!-- Foto recortada (à frente, centro) -->
  <div class="hero-personal__photo">
    <img
      src="../../../../assets/images/placeholders/placeholder-avatar-transparent.png"
      alt=""
      width="480"
      height="720"
      loading="eager"
      decoding="async"
    >
  </div>

  <!-- CTAs na base -->
  <div class="hero-personal__actions">
    <a href="#" class="button button--filled button--pill button--sm">
      Ver portfólio
      <svg class="button__icon" aria-hidden="true" focusable="false"><use href="#icon-arrow-upright"/></svg>
    </a>
    <a href="#" class="button button--glass button--pill button--sm">
      Fale comigo
      <svg class="button__icon" aria-hidden="true" focusable="false"><use href="#icon-arrow-upright"/></svg>
    </a>
  </div>

</section>
</body>
</html>
