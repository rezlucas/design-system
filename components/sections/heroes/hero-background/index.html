<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Background — Design System</title>

  <!-- Tokens, reset e utilitários globais -->
  <link rel="stylesheet" href="../../../../tokens/tokens.css">
  <link rel="stylesheet" href="../../../../base/reset.css">
  <link rel="stylesheet" href="../../../../base/base.css">
  <link rel="stylesheet" href="../../../../base/utilities.css">

  <!-- Átomo: botão (dependência direta) -->
  <link rel="stylesheet" href="../../../atoms/buttons/style.css">

  <!-- Este componente -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DS Navigator Bar — utilitário de navegação, não é parte do componente -->
<div id="ds-nav-bar">
  <a href="../../../../index.html" id="ds-nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Todos os componentes
  </a>
  <span id="ds-nav-label">Hero Background</span>
</div>
<style>
  #ds-nav-bar { position: sticky; top: 0; z-index: 9999; background: #0F0E1A; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 40px; gap: 16px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
  #ds-nav-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.65); text-decoration: none; font-weight: 500; transition: color .15s; white-space: nowrap; }
  #ds-nav-back:hover { color: #fff; }
  #ds-nav-back svg { flex-shrink: 0; }
  #ds-nav-label { font-size: 11px; color: rgba(255,255,255,.3); letter-spacing: .04em; white-space: nowrap; }
</style>

  <!-- ─────────────────────────────────────────────────────────
       Link "skip to content" — obrigatório para acessibilidade
       ───────────────────────────────────────────────────────── -->
  <a class="skip-link" href="#hero-content">Ir para o conteúdo</a>

  <main>

    <section class="hero-background" aria-labelledby="hero-title">

      <!-- Imagem de fundo (proporção landscape para desktop / 4:3 para mobile) -->
      <div class="hero-background__media">
        <img
          class="hero-background__image"
          src="../../../../assets/images/placeholders/placeholder-background-image-section.png"
          alt="empreendedor(a) sorrindo no seu estabelecimento comercial, segurando uma maquininha de pagamento"
          width="1920"
          height="579"
          loading="eager"
          decoding="async"
        >
      </div>

      <!-- Camada de conteúdo
           Mobile : fundo sólido escuro
           Desktop: gradiente escuro→transparente sobre a imagem -->
      <div class="hero-background__overlay">
        <div class="hero-background__container container" id="hero-content">
          <div class="hero-background__content">

            <span class="hero-background__eyebrow">NOVO · PLANO ENTERPRISE DISPONÍVEL</span>

            <h1 class="hero-background__title" id="hero-title">
              Automatize suas vendas e feche mais negócios
            </h1>

            <p class="hero-background__description">
              Plataforma completa de CRM e automação para equipes comerciais
              que querem crescer sem aumentar o time.
            </p>

            <div class="hero-background__actions">
              <!--
                button--inverse: fundo branco + texto escuro.
                Correto para fundos escuros (mobile: sólido preto;
                desktop: gradiente escuro).
              -->
              <a href="#" class="button button--filled button--lg button--inverse">
                Começar gratuitamente
              </a>
            </div>

          </div>
        </div>
      </div>

    </section>

  </main>

</body>
</html>
