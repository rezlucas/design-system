<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Carousel / Gallery — Design System</title>
  <link rel="stylesheet" href="../../../../tokens/tokens.css">
  <link rel="stylesheet" href="../../../../base/reset.css">
  <link rel="stylesheet" href="../../../../base/base.css">
  <link rel="stylesheet" href="../../../../base/utilities.css">
  <link rel="stylesheet" href="../../../atoms/buttons/style.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: var(--color-background); }
    .demo-label {
      text-align: center;
      padding-block: var(--space-xl);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: var(--letter-spacing-wider);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

<!-- DS Navigator Bar — utilitário de navegação, não é parte do componente -->
<div id="ds-nav-bar">
  <a href="../../../../index.html" id="ds-nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Todos os componentes
  </a>
  <span id="ds-nav-label">Image Carousel · Gallery</span>
</div>
<style>
  #ds-nav-bar { position: sticky; top: 0; z-index: 9999; background: #0F0E1A; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 40px; gap: 16px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
  #ds-nav-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.65); text-decoration: none; font-weight: 500; transition: color .15s; white-space: nowrap; }
  #ds-nav-back:hover { color: #fff; }
  #ds-nav-back svg { flex-shrink: 0; }
  #ds-nav-label { font-size: 11px; color: rgba(255,255,255,.3); letter-spacing: .04em; white-space: nowrap; }
</style>

  <!-- Ícones reutilizáveis -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </symbol>
    <symbol id="icon-arrow-upright" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 17L17 7M7 7h10v10"/>
    </symbol>
  </svg>


  <!-- ═══════════════════════════════════
       VARIANT --gallery (peek centralizado)
  ════════════════════════════════════ -->
  <p class="demo-label">Variant 1 — Gallery (imagem central com peek lateral)</p>

  <section class="image-carousel image-carousel--gallery" aria-label="Galeria de imagens">

    <div class="image-carousel__stage">

      <div class="image-carousel__slider" data-js="slider">
        <div class="image-carousel__track" data-js="track">
          <div class="image-carousel__slide">
            <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Dashboard de Pipeline — visão completa do funil" width="1920" height="579" loading="eager">
          </div>
          <div class="image-carousel__slide">
            <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Automações — fluxos de e-mail configuráveis" width="1920" height="579" loading="lazy">
          </div>
          <div class="image-carousel__slide">
            <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Relatórios — métricas em tempo real" width="1920" height="579" loading="lazy">
          </div>
        </div>
      </div>

      <button class="image-carousel__arrow image-carousel__arrow--prev" type="button" aria-label="Slide anterior" data-js="prev">
        <svg aria-hidden="true" focusable="false"><use href="#icon-arrow-left"/></svg>
      </button>
      <button class="image-carousel__arrow image-carousel__arrow--next" type="button" aria-label="Próximo slide" data-js="next">
        <svg aria-hidden="true" focusable="false"><use href="#icon-arrow-right"/></svg>
      </button>

    </div>

    <div class="image-carousel__dots" role="tablist" aria-label="Slides" data-js="dots">
      <button class="image-carousel__dot image-carousel__dot--active" type="button" role="tab" aria-label="Slide 1" data-index="0"></button>
      <button class="image-carousel__dot" type="button" role="tab" aria-label="Slide 2" data-index="1"></button>
      <button class="image-carousel__dot" type="button" role="tab" aria-label="Slide 3" data-index="2"></button>
    </div>

  </section>


  <!-- ═══════════════════════════════════
       VARIANT --photo-grid (Jambo Gallery)
  ════════════════════════════════════ -->
  <p class="demo-label">Variant 2 — Photo Grid (2 linhas com imagens cortadas nas laterais)</p>

  <section class="image-carousel image-carousel--photo-grid" aria-labelledby="gallery-title">

    <div class="container">
      <div class="image-carousel__header">
        <p style="font-size:var(--font-size-xs);font-weight:var(--font-weight-semibold);letter-spacing:var(--letter-spacing-wider);text-transform:uppercase;color:var(--color-text-muted);margin-block-end:var(--space-sm)">GALLERY SECTION</p>
        <h2 class="image-carousel__title" id="gallery-title">Nossa plataforma em ação</h2>
      </div>
    </div>

    <div class="image-carousel__photo-grid">

      <div class="image-carousel__photo-item">
        <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Dashboard de Pipeline — visão completa do funil" width="600" height="450" loading="lazy">
      </div>
      <div class="image-carousel__photo-item">
        <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Automações — fluxos de e-mail configuráveis" width="600" height="450" loading="lazy">
      </div>
      <div class="image-carousel__photo-item">
        <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Relatórios — métricas em tempo real" width="600" height="450" loading="lazy">
      </div>
      <div class="image-carousel__photo-item">
        <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Integrações — conecte suas ferramentas favoritas" width="600" height="400" loading="lazy">
      </div>
      <div class="image-carousel__photo-item">
        <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Mobile — gerencie seu pipeline de qualquer lugar" width="600" height="400" loading="lazy">
      </div>
      <div class="image-carousel__photo-item">
        <img src="../../../../assets/images/placeholders/placeholder-background-image-section.png" alt="Veja como é simples gerenciar suas vendas" width="600" height="400" loading="lazy">
      </div>

    </div>

    <div class="image-carousel__photo-footer">
      <a href="#" class="button button--filled button--pill button--md">Ver a plataforma completa</a>
    </div>

  </section>

  <script>
    /* ── Carousel simples para --gallery ── */
    document.querySelectorAll('.image-carousel--gallery').forEach(carousel => {
      const track  = carousel.querySelector('[data-js="track"]');
      const slides = Array.from(track.children);
      const dots   = Array.from(carousel.querySelectorAll('[data-js="dots"] [data-index]'));
      const prevBtn = carousel.querySelector('[data-js="prev"]');
      const nextBtn = carousel.querySelector('[data-js="next"]');
      let current  = 0;
      const total  = slides.length;

      function getGap() {
        const s = getComputedStyle(track);
        const v = parseFloat(s.columnGap);
        if (!isNaN(v) && v > 0) return v;
        return parseFloat(s.gap) || 0;
      }

      function go(idx) {
        current = (idx + total) % total;
        const slideW = slides[0].getBoundingClientRect().width + getGap();
        track.style.transform = `translateX(${-current * slideW}px)`;
        dots.forEach((d, i) => d.classList.toggle('image-carousel__dot--active', i === current));
        if (prevBtn) prevBtn.disabled = current === 0;
        if (nextBtn) nextBtn.disabled = current === total - 1;
      }

      if (prevBtn) prevBtn.addEventListener('click', () => go(current - 1));
      if (nextBtn) nextBtn.addEventListener('click', () => go(current + 1));
      dots.forEach(d => d.addEventListener('click', () => go(+d.dataset.index)));

      window.addEventListener('resize', () => go(current));
      go(0);
    });
  </script>

</body>
</html>
