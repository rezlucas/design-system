<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations Orbit — Design System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ds-nav-bar">
  <a href="../../../../index.html" id="ds-nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Todos os componentes
  </a>
  <span id="ds-nav-label">Integrations Orbit</span>
</div>
<style>
  #ds-nav-bar { position: sticky; top: 0; z-index: 9999; background: #0F0E1A; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 40px; gap: 16px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
  #ds-nav-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.65); text-decoration: none; font-weight: 500; transition: color .15s; white-space: nowrap; }
  #ds-nav-back:hover { color: #fff; }
  #ds-nav-back svg { flex-shrink: 0; }
  #ds-nav-label { font-size: 11px; color: rgba(255,255,255,.3); letter-spacing: .04em; white-space: nowrap; }
</style>

<!-- ═══════════ V1 — Fileira de ícones coloridos sobre navy com anéis ═══════════ -->

<section class="integrations-section">
  <div class="rings" aria-hidden="true"></div>
  <div class="container integrations-inner">
    <div class="section-heading centered">
      <span class="section-badge dark-badge">Connections</span>
      <h2>Integrations</h2>
    </div>

    <div class="integration-orbit" aria-hidden="true">
      <span class="integration-icon tiny blue"></span>
      <span class="integration-icon small orange"></span>
      <span class="integration-icon medium yellow"></span>
      <span class="integration-icon large indigo"></span>
      <span class="integration-icon core">Z</span>
      <span class="integration-icon large sky"></span>
      <span class="integration-icon medium teal"></span>
      <span class="integration-icon small mixed"></span>
      <span class="integration-icon tiny coral"></span>
    </div>

    <a class="pill-button" href="#">
      Explore Integrations
      <span class="arrow-icon white" aria-hidden="true"></span>
    </a>
  </div>
</section>

</body>
</html>
